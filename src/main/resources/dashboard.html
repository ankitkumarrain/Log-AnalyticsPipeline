<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log Analytics Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; }
    header { background: #1e293b; padding: 20px 40px; border-bottom: 2px solid #3b82f6; }
    header h1 { color: #3b82f6; font-size: 24px; }
    header p { color: #94a3b8; font-size: 13px; margin-top: 4px; }
    .container { padding: 30px 40px; }
    .cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
    .card { background: #1e293b; border-radius: 12px; padding: 24px; border-left: 4px solid; }
    .card.error { border-color: #ef4444; }
    .card.warn  { border-color: #f59e0b; }
    .card.info  { border-color: #3b82f6; }
    .card.debug { border-color: #8b5cf6; }
    .card h3 { font-size: 13px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }
    .card .count { font-size: 48px; font-weight: bold; margin: 10px 0; }
    .card.error .count { color: #ef4444; }
    .card.warn  .count { color: #f59e0b; }
    .card.info  .count { color: #3b82f6; }
    .card.debug .count { color: #8b5cf6; }
    .section { background: #1e293b; border-radius: 12px; padding: 24px; margin-bottom: 24px; }
    .section h2 { font-size: 16px; color: #94a3b8; margin-bottom: 16px; border-bottom: 1px solid #334155; padding-bottom: 10px; }
    .error-item { background: #450a0a; border-left: 3px solid #ef4444; padding: 10px 16px; margin-bottom: 8px; border-radius: 6px; font-size: 14px; color: #fca5a5; }
    .alert-item { background: #1c1917; border-left: 3px solid #f59e0b; padding: 10px 16px; margin-bottom: 8px; border-radius: 6px; font-size: 14px; }
    .alert-item .service { color: #fbbf24; font-weight: bold; }
    .alert-item .count-badge { background: #ef4444; color: white; padding: 2px 8px; border-radius: 20px; font-size: 12px; margin-left: 8px; }
    .status { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: #22c55e; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    .status span { font-size: 13px; color: #22c55e; }
    .refresh { font-size: 12px; color: #475569; margin-left: auto; }
    button { background: #3b82f6; color: white; border: none; padding: 8px 20px; border-radius: 8px; cursor: pointer; font-size: 14px; }
    button:hover { background: #2563eb; }
    .empty { color: #475569; font-size: 14px; text-align: center; padding: 20px; }
  </style>
</head>
<body>

<header>
  <h1>🚀 Log Analytics Pipeline</h1>
  <p>Real-time monitoring — FS2 + Cats Effect + Kafka</p>
</header>

<div class="container">

  <div class="status">
    <div class="dot"></div>
    <span id="status-text">Connecting...</span>
    <span class="refresh" id="last-refresh"></span>
    <button onclick="fetchAll()">🔄 Refresh</button>
  </div>

  <!-- Metric Cards -->
  <div class="cards">
    <div class="card error">
      <h3>❌ Errors</h3>
      <div class="count" id="error-count">—</div>
    </div>
    <div class="card warn">
      <h3>⚠️ Warnings</h3>
      <div class="count" id="warn-count">—</div>
    </div>
    <div class="card info">
      <h3>ℹ️ Info</h3>
      <div class="count" id="info-count">—</div>
    </div>
    <div class="card debug">
      <h3>🔍 Debug</h3>
      <div class="count" id="debug-count">—</div>
    </div>
  </div>

  <!-- Recent Errors -->
  <div class="section">
    <h2>🔴 Recent Errors</h2>
    <div id="errors-list"><div class="empty">Loading...</div></div>
  </div>

  <!-- Alerts -->
  <div class="section">
    <h2>🚨 Window Alerts</h2>
    <div id="alerts-list"><div class="empty">Loading...</div></div>
  </div>

</div>

<script>
  const API = 'http://localhost:8081';

  async function fetchMetrics() {
    const res = await fetch(`${API}/metrics`);
    const data = await res.json();
    document.getElementById('error-count').textContent = data.errorCount;
    document.getElementById('warn-count').textContent  = data.warnCount;
    document.getElementById('info-count').textContent  = data.infoCount;
    document.getElementById('debug-count').textContent = data.debugCount;
  }

  async function fetchErrors() {
    const res = await fetch(`${API}/errors`);
    const data = await res.json();
    const el = document.getElementById('errors-list');
    if (data.recentErrors.length === 0) {
      el.innerHTML = '<div class="empty">No errors yet</div>';
    } else {
      el.innerHTML = data.recentErrors
        .map(e => `<div class="error-item">❌ ${e}</div>`)
        .join('');
    }
  }

  async function fetchAlerts() {
    const res = await fetch(`${API}/alerts`);
    const data = await res.json();
    const el = document.getElementById('alerts-list');
    if (data.alerts.length === 0) {
      el.innerHTML = '<div class="empty">No alerts yet</div>';
    } else {
      el.innerHTML = data.alerts
        .map(a => `
          <div class="alert-item">
            <span class="service">${a.service}</span>
            <span class="count-badge">${a.count} ${a.level}</span>
          </div>`)
        .join('');
    }
  }

  async function fetchAll() {
    try {
      await Promise.all([fetchMetrics(), fetchErrors(), fetchAlerts()]);
      document.getElementById('status-text').textContent = 'Pipeline Running';
      document.getElementById('last-refresh').textContent =
        'Last updated: ' + new Date().toLocaleTimeString();
    } catch(e) {
      document.getElementById('status-text').textContent = 'API Offline — sbt run karo!';
      document.getElementById('status-text').style.color = '#ef4444';
    }
  }

  // Auto refresh har 5 seconds
  fetchAll();
  setInterval(fetchAll, 5000);
</script>

</body>
</html>
